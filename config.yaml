behaviors:
  GFSX_Brain:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 40960
      learning_rate: 0.00025
      beta: 0.02
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      memory:
        sequence_length: 64
        memory_size: 256
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    checkpoint_interval: 100000
    max_steps: 50000000
    time_horizon: 2000
    summary_freq: 20000

environment_parameters:
  approach_reward: 1.0
  centering_reward: 0.3

  grab_reward: 12.0
  hold_tick_reward: 0.05
  gripper_ir_reward: 0.008
  grab_miss_penalty: 0.0
  search_find_reward: 0.5
  ball_visible_reward: 0.005

  fall_penalty: -1.0
  timeout_penalty: -0.5

  action_penalty: 0.02
  time_penalty: 0.01
  obstacle_penalty: 0.005

  wall_collision_penalty: 0.15
  obstacle_collision_penalty: 0.08

  spin_penalty: 0.0
  forward_penalty: 0.0
  reverse_penalty: 0.01

  shaping_gamma: 0.99

  episode_time_limit: 90.0
  hold_ticks_required: 50

  max_linear_cmd: 0.25

  ball_spawn_jitter: 0.15
  ball_spawn_radius: 0.0
  hidden_spawn_fraction: 0.3

  box_count_min: 4
  box_count_max: 15

  dr_enabled: 1.0
  us_noise: 0.05
  odom_drift: 0.03
  odom_noise: 0.01
  yolo_dropout_chance: 0.15
  latency_min: 8
  latency_max: 13
  mass_min: 1.0
  mass_max: 4.0
