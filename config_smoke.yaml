behaviors:
  GFSX_Brain:
    trainer_type: ppo

    hyperparameters:
      batch_size: 512
      buffer_size: 4096
      learning_rate: 0.00025
      beta: 0.02
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      memory:
        sequence_length: 32
        memory_size: 128

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    keep_checkpoints: 2
    checkpoint_interval: 25000
    max_steps: 50000
    time_horizon: 512
    summary_freq: 5000

environment_parameters:
  approach_reward: 1.0
  centering_reward: 0.3

  grab_reward: 12.0
  hold_tick_reward: 0.05
  gripper_ir_reward: 0.008
  grab_miss_penalty: 0.0
  search_find_reward: 0.5
  ball_visible_reward: 0.005

  fall_penalty: -1.0
  timeout_penalty: -0.5

  action_penalty: 0.02
  time_penalty: 0.01
  obstacle_penalty: 0.005

  wall_collision_penalty: 0.15
  obstacle_collision_penalty: 0.08

  spin_penalty: 0.0
  forward_penalty: 0.0
  reverse_penalty: 0.01

  shaping_gamma: 0.99

  episode_time_limit: 30.0
  hold_ticks_required: 50

  max_linear_cmd: 0.25

  ball_spawn_jitter: 0.05
  ball_spawn_radius: 0.0
  hidden_spawn_fraction: 0.0

  box_count_min: 4
  box_count_max: 6

  dr_enabled: 0.0
  us_noise: 0.0
  odom_drift: 0.0
  odom_noise: 0.0
  yolo_dropout_chance: 0.0
  latency_min: 0
  latency_max: 0
  mass_min: 2.5
  mass_max: 2.5
